<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>에어트럼펫 — 성균관대학교 관악부 특별판</title>
    <meta name="description" content="손동작과 입 모양으로 연주하는 가상 트럼펫 — MediaPipe와 Web Audio 기술로 브라우저에서 바로 즐기세요." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div id="app">

      <!-- 로딩 화면 -->
      <div id="loading-screen">
        <div class="loading-content">
          <img src="/logos/Asset 3@2x.png" alt="성균관대학교 관악부 로고" class="main-logo" />
          <h1 class="loading-title">AirTrumpet</h1>
          <p class="loading-subtitle">성균관대학교 관악부 특별판</p>
          <div class="loading-bar-track">
            <div class="loading-bar-fill" id="loading-progress"></div>
          </div>
          <p class="loading-status" id="loading-status-text">MediaPipe 모델 불러오는 중…</p>
        </div>
      </div>

      <!-- 시작 화면 -->
      <div id="start-screen" class="hidden">
        <div class="start-content">
          <h1 class="start-title">에어트럼펫</h1>
          <p class="start-subtitle">성균관대학교 관악부 특별판</p>
          <button id="start-btn" class="btn-primary">
            <span class="btn-icon">🎵</span>
            연주 시작하기
          </button>
          <div class="start-footer">
            <img src="/logos/Asset 3@2x.png" alt="성균관대학교 관악부 로고" class="footer-logo" />
            <p class="start-hint">웹캠 액세스가 필요합니다 • 성균관대학교 관악부를 위해 개발되었습니다</p>
          </div>
        </div>
      </div>

      <!-- 메인 인터페이스 -->
      <div id="main-container" class="hidden">
        <!-- 비디오 / 캔버스 -->
        <div id="video-container">
          <video id="webcam" autoplay playsinline></video>
          <canvas id="overlay-canvas"></canvas>

          <!-- 모바일 전용 상단 HUD (가로 가득) -->
          <div id="mobile-status-hud" class="hud-card">
            <div class="mobile-hud-item">
              <div class="mini-hud-label">현재 음</div>
              <div id="note-display-mobile" class="note-val">—</div>
            </div>
            <div class="mobile-hud-divider"></div>
            <div class="mobile-hud-item">
              <div class="mini-hud-label">운지</div>
              <div id="valve-display-mobile" class="note-val">0</div>
            </div>
            <div class="mobile-hud-divider"></div>
            <div class="mobile-hud-item">
              <div class="mini-hud-label">입 모양</div>
              <div id="lip-display-mobile" class="status-val">감지 중</div>
            </div>
          </div>

          <!-- 왼쪽 상단 통합 HUD (PC 전용 설정) -->
          <div id="top-left-hud">
            <div class="mini-hud-group">
              <div class="mini-hud-label">현재 음표</div>
              <div id="note-display" class="note-display-mini">—</div>
              <div id="mini-lip-state" class="mini-status">감지 중...</div>
            </div>
            
            <div class="mini-hud-divider"></div>
            
            <div class="mini-hud-group">
              <div class="mini-hud-label">설정</div>
              <button id="toggle-octave-btn" class="btn-settings">옥타브 숨기기</button>
              <button id="toggle-mute-btn" class="btn-mute">
                <span id="mute-text">소리 끄기</span>
              </button>
            </div>
          </div>

          <!-- 오른쪽 상단 미션 HUD -->
          <div id="mission-hud" class="hud-card">
            <div class="mini-hud-label">오늘의 미션</div>
            <div id="mission-content">
              <p class="mission-title">기본 음계 정복</p>
              <button id="mission-start-btn" class="btn-mission">미션 시작</button>
              
              <div id="mission-active-panel" class="hidden">
                <div class="mission-target">목표: <span id="target-note-display">—</span></div>
                <p id="mission-status" class="mission-status-text">연주를 시작하세요!</p>
              </div>
            </div>
          </div>

          <!-- FPS 카운터 -->
          <div id="fps-counter">-- FPS</div>
          
          <!-- 모바일 전용 컨트롤 (왼쪽 아래 세로 나열) -->
          <div id="mobile-controls">
            <button id="toggle-octave-btn-mobile" class="btn-settings-mobile">옥타브 숨기기</button>
            <button id="toggle-mute-btn-mobile" class="btn-mute-mobile">
              <span id="mute-text-mobile">소리 끄기</span>
            </button>
          </div>
          
          <!-- 운지표 토글 버튼 (PC/모바일 공통) -->
          <button id="toggle-fingering-btn" class="btn-floating-guide active">
            <span class="btn-icon">📖</span>
            <span class="btn-text">운지표</span>
          </button>
        </div>

        <!-- 하단 운지표 HUD (토글 가능) -->
        <div id="hud-panel-container">
          <div id="hud-panel">
            <div id="hud-left-column">
            <!-- 저음역 카드 -->
            <div class="hud-card fingering-group" id="group-closed">
              <div class="group-header">
                <img src="/mouth/mouth_closed.png" class="mouth-img" alt="Closed Mouth" />
                <span>저음 (입 닫음)</span>
              </div>
              <div id="list-closed" class="fingering-list-static"></div>
            </div>

            <!-- 중음역 카드 -->
            <div class="hud-card fingering-group" id="group-tense">
              <div class="group-header">
                <img src="/mouth/mouth_strain.png" class="mouth-img" alt="Tense Mouth" />
                <span>중음 (긴장)</span>
              </div>
              <div id="list-tense" class="fingering-list-static"></div>
            </div>

            <!-- 고음역 카드 -->
            <div class="hud-card fingering-group" id="group-pursed">
              <div class="group-header">
                <img src="/mouth/mouth_o.png" class="mouth-img" alt="O Mouth" />
                <span>고음 (오)</span>
              </div>
              <div id="list-pursed" class="fingering-list-static"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
