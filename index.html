<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에어트럼펫 — 가상 제스처 제어 트럼펫</title>
  <meta name="description" content="손 움직임과 입모양을 사용해 가상의 트럼펫을 연주하세요 — MediaPipe와 Web Audio를 활용하여 브라우저에서 모두 실행됩니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <div id="app">

    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-icon">🎺</div>
        <h1 class="loading-title">에어트럼펫</h1>
        <p class="loading-subtitle">제스처 인식 초기화 중…</p>
        <div class="loading-bar-track">
          <div class="loading-bar-fill" id="loading-progress"></div>
        </div>
        <p class="loading-status" id="loading-status-text">MediaPipe 모델 불러오는 중…</p>
      </div>
    </div>

    <!-- Start Screen (shown after models load, before camera starts) -->
    <div id="start-screen" class="hidden">
      <div class="start-content">
        <div class="start-icon">🎺</div>
        <h1 class="start-title">에어트럼펫</h1>
        <p class="start-subtitle">제스처로 제어하는 가상 트럼펫</p>
        <button id="start-btn" class="btn-primary">
          <span class="btn-icon">🎵</span>
          연주 시작하기
        </button>
        <p class="start-hint">웹캠 접근 권한이 필요합니다 • 손 제스처와 입술 모양을 조합해 음표를 연주하세요</p>
      </div>
    </div>

    <!-- Main Interface -->
    <div id="main-container" class="hidden">

      <!-- Video / Canvas Stack -->
      <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>

        <!-- FPS Counter -->
        <div id="fps-counter">-- FPS</div>
      </div>

      <!-- HUD Panel -->
      <div id="hud-panel">

        <!-- Valve State Indicator -->
        <div class="hud-section" id="valve-section">
          <h2 class="hud-label">밸브 (Valves)</h2>
          <div class="valve-indicators">
            <div class="valve" id="valve-front">
              <span class="valve-label">1</span>
              <span class="valve-name">앞</span>
            </div>
            <div class="valve" id="valve-middle">
              <span class="valve-label">2</span>
              <span class="valve-name">중간</span>
            </div>
            <div class="valve" id="valve-back">
              <span class="valve-label">3</span>
              <span class="valve-name">뒤</span>
            </div>
          </div>
        </div>

        <!-- Lip State Indicator -->
        <div class="hud-section" id="lip-section">
          <h2 class="hud-label">입술 모양 (Embouchure)</h2>
          <div class="lip-state-badge" id="lip-badge">감지되지 않음</div>
        </div>

        <!-- Note Display -->
        <div class="hud-section" id="note-section">
          <h2 class="hud-label">음표 (Note)</h2>
          <div class="note-display" id="note-display">—</div>
        </div>

        <!-- Controls -->
        <div class="hud-section" id="controls-section">
          <button id="stop-btn" class="btn-secondary">중지 (Stop)</button>
        </div>

      </div>
    </div>

  </div>

  <script type="module" src="/js/app.js"></script>
</body>

</html>
